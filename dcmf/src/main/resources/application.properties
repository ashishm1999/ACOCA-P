# --- Spring Boot ---
server.port=${DCMF_PORT:8083}
spring.application.name=dcmf

# --- gRPC ---
grpc.port=${DCMF_GRPC_PORT:9083}

# --- DCMF-specific ---
dcmf.alpha=${DCMF_ALPHA_EWMA:0.60}
dcmf.beta=${DCMF_BETA_UTILITY:0.50}
dcmf.beliefThreshold=${DCMF_BELIEF_THRESHOLD:0.6}
dcmf.upstream.capme=http://capme:8081
dcmf.upstream.cfms=http://cfms:8082

# --- Logging ---
logging.level.root=INFO
logging.level.org.coaas.dcmf=DEBUG
