server.port=${ECCF_PORT:8085}
spring.application.name=eccf

eccf.nodeId=${NODE_ID:local}
eccf.peers=${PEERS:}
eccf.gossipIntervalSec=${ECCF_T_GOSSIP_S:2}
eccf.syncIntervalSec=${ECCF_T_SYNC_S:60}
eccf.cmsWidth=${ECCF_CMS_WIDTH:1024}
eccf.cmsDepth=${ECCF_CMS_DEPTH:4}
eccf.stabilityAlpha=${ECCF_STABILITY_ALPHA:0.3}
eccf.rateBeta=${ECCF_RATE_BETA:0.5}

logging.level.root=INFO
logging.level.org.coaas.eccf=DEBUG
